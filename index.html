<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem E-Log WFB & Kenderaan Kerajaan | v1.0.2 Realistic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                        url('https://www.malaysia.gov.my/portal/images/jata_negara.png') no-repeat center center fixed;
            background-size: contain;
        }
        .anime-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15;
            background: url('https://images.alphacoders.com/132/1327116.png') center/cover;
            filter: grayscale(30%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .btn-realistic {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 rgb(15, 23, 42);
        }
        .btn-realistic:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .late-highlight { background-color: #fee2e2 !important; color: #dc2626; font-weight: bold; }
        .ot-highlight { background-color: #dcfce7 !important; color: #166534; }
        .hide-profile { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="anime-bg"></div>

    <header class="p-4 glass-card m-4 flex flex-wrap justify-between items-center">
        <div class="flex items-center space-x-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Coat_of_arms_of_Malaysia.svg/1200px-Coat_of_arms_of_Malaysia.svg.png" class="h-16" alt="Jata Malaysia">
            <h1 class="hidden md:block font-bold text-slate-800">SISTEM E-LOG PINTAR</h1>
        </div>
        <div class="text-center">
            <div id="realtime-clock" class="text-blue-600 font-mono font-bold text-lg"></div>
        </div>
        <div id="auth-section" class="flex items-center space-x-3">
            <button onclick="loginGoogle()" id="login-btn" class="btn-realistic bg-white px-6 py-2 rounded-full border flex items-center gap-2 font-bold">
                <img src="https://www.google.com/favicon.ico" class="w-4"> Login Google
            </button>
            <div id="user-profile" class="hide-profile items-center gap-2">
                <img id="user-avatar" class="w-10 h-10 rounded-full border-2 border-blue-500">
                <button onclick="logout()" class="text-red-500 text-sm font-bold underline">Keluar</button>
            </div>
        </div>
    </header>

    <main class="p-4 space-y-8">
        <!-- BAHAGIAN WFB -->
        <section class="glass-card p-6 overflow-x-auto">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-blue-500 inline-block text-blue-700">KAD WAKTU WFB</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div><h3 class="font-bold mb-2">BAHAGIAN A (1-15hb)</h3><table class="w-full text-xs border"><thead class="bg-slate-800 text-white"><tr><th class="border p-1">TGL</th><th class="border p-1">MASUK</th><th class="border p-1">KELUAR</th><th class="border p-1">MASUK</th><th class="border p-1">KELUAR</th><th class="border p-1">NOTA</th></tr></thead><tbody id="table-a"></tbody></table></div>
                <div><h3 class="font-bold mb-2">BAHAGIAN B (16-31hb)</h3><table class="w-full text-xs border"><thead class="bg-slate-800 text-white"><tr><th class="border p-1">TGL</th><th class="border p-1">MASUK</th><th class="border p-1">KELUAR</th><th class="border p-1">MASUK</th><th class="border p-1">KELUAR</th><th class="border p-1">NOTA</th></tr></thead><tbody id="table-b"></tbody></table></div>
            </div>
        </section>

        <!-- BAHAGIAN LOG KENDERAAN -->
        <section class="glass-card p-6">
            <h2 class="text-2xl font-bold mb-4 border-b-2 border-green-500 inline-block text-green-700">LOG KENDERAAN KERAJAAN</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-green-50 p-4 rounded-xl">
                <div><label class="text-xs font-bold">Bulan Log</label><input type="month" id="log-bulan" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs font-bold">No. Pendaftaran</label><input type="text" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs font-bold">Odo Permulaan</label><input type="number" id="odo-start" placeholder="0" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs font-bold">Odo Akhir</label><input type="number" id="odo-input" placeholder="0" class="w-full p-2 border rounded"></div>
            </div>

            <div class="flex justify-between items-center p-4 bg-slate-800 text-white rounded-lg mb-4">
                <div>
                    <span class="text-sm">Jarak Perjalanan:</span>
                    <span id="jarak-calc" class="text-2xl font-bold text-yellow-400 ml-2">0</span> KM
                </div>
                <!-- BUTANG SIMPAN DI SINI -->
                <button onclick="simpanLogKenderaan()" class="btn-realistic bg-green-500 hover:bg-green-600 px-8 py-3 rounded-xl font-bold text-white">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> SIMPAN REKOD KE AWAN
                </button>
            </div>
        </section>

        <!-- BAHAGIAN UPLOAD -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 text-center cursor-pointer" onclick="document.getElementById('resit-minyak').click()">
                <i class="fas fa-gas-pump text-4xl text-orange-500 mb-2"></i>
                <h3 class="font-bold">Resit Minyak</h3>
                <input type="file" id="resit-minyak" class="hidden">
            </div>
            <div class="glass-card p-6 text-center cursor-pointer" onclick="document.getElementById('resit-tng').click()">
                <i class="fas fa-credit-card text-4xl text-blue-500 mb-2"></i>
                <h3 class="font-bold">Resit TNG</h3>
                <input type="file" id="resit-tng" class="hidden">
            </div>
            <div class="glass-card p-6 text-center cursor-pointer" onclick="document.getElementById('resit-odo').click()">
                <i class="fas fa-tachometer-alt text-4xl text-purple-500 mb-2"></i>
                <h3 class="font-bold">Gambar Odometer</h3>
                <input type="file" id="resit-odo" class="hidden">
            </div>
        </section>
    </main>

    <script>
        // 1. CONFIG
        const SUPABASE_URL = 'https://eefdyxtfcfheslvcfrss.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZmR5eHRmY2ZoZXNsdmNmcnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Njk4MjEsImV4cCI6MjA5MzA0NTgyMX0.I7tl5eiRkn2vNyjbV2GAoI25ZwcvYCP5pjVB4aT5r_I';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. AUTH LOGIC
        async function loginGoogle() {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } });
        }
        async function logout() { await supabase.auth.signOut(); window.location.reload(); }

        supabase.auth.onAuthStateChange((event, session) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userAvatar = document.getElementById('user-avatar');
            if (session) {
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hide-profile');
                userProfile.classList.add('flex');
                userAvatar.src = session.user.user_metadata.avatar_url;
            } else {
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hide-profile');
            }
        });

        // 3. UI LOGIC (CLOCK & TABLE)
        function updateClock() {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleDateString('ms-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        function generateTable(id, start, end) {
            const tbody = document.getElementById(id);
            for (let i = start; i <= end; i++) {
                tbody.innerHTML += `<tr><td class="border p-1 text-center font-bold">${i}</td><td class="border p-0"><input type="time" onchange="checkTime(this)" class="w-full p-1 border-none bg-transparent"></td><td class="border p-0"><input type="time" class="w-full p-1 border-none bg-transparent"></td><td class="border p-0"><input type="time" class="w-full p-1 border-none bg-transparent"></td><td class="border p-0"><input type="time" class="w-full p-1 border-none bg-transparent"></td><td class="border p-0"><input type="text" class="w-full p-1 border-none bg-transparent"></td></tr>`;
            }
        }
        generateTable('table-a', 1, 15);
        generateTable('table-b', 16, 31);

        // 4. CALCULATION LOGIC
        const odoStart = document.getElementById('odo-start');
        const odoInput = document.getElementById('odo-input');
        const jarakCalc = document.getElementById('jarak-calc');

        function updateJarak() {
            const start = parseInt(odoStart.value) || 0;
            const end = parseInt(odoInput.value) || 0;
            const dist = end - start;
            jarakCalc.innerText = dist > 0 ? dist : 0;
        }
        odoStart.oninput = updateJarak;
        odoInput.oninput = updateJarak;

        // 5. SAVE DATA TO SUPABASE (PENTING!)
        async function simpanLogKenderaan() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return alert("Sila login dengan Google dahulu!");

            const bulan = document.getElementById('log-bulan').value;
            const awal = parseInt(odoStart.value) || 0;
            const akhir = parseInt(odoInput.value) || 0;
            const jarak = parseInt(jarakCalc.innerText) || 0;

            if(!bulan) return alert("Sila pilih Bulan Log!");

            // Hantar ke Table 'log_kenderaan'
            const { error } = await supabase.from('log_kenderaan').insert([{
                user_id: session.user.id,
                bulan: bulan,
                odo_awal: awal,
                odo_akhir: akhir,
                jarak: jarak
            }]);

            if (error) {
                alert("Gagal simpan: " + error.message);
            } else {
                alert("✅ Rekod berjaya disimpan ke pangkalan data!");
            }
        }

        // 6. STORAGE LOGIC
        async function uploadFile(fileInputId, bucketName) {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return alert("Sila login dahulu!");

            const fileInput = document.getElementById(fileInputId);
            const file = fileInput.files[0];
            if (!file) return;

            const filePath = `${session.user.id}/${Date.now()}-${file.name}`;
            const { data, error } = await supabase.storage.from(bucketName).upload(filePath, file);

            if (error) alert("Upload Gagal: " + error.message);
            else alert("✅ Gambar berjaya dihantar!");
        }

        document.getElementById('resit-minyak').onchange = () => uploadFile('resit-minyak', 'resits');
        document.getElementById('resit-tng').onchange = () => uploadFile('resit-tng', 'resits');
        document.getElementById('resit-odo').onchange = () => uploadFile('resit-odo', 'resits');

    </script>
</body>
</html>
